name: Build and Release Python Versions (Reusable)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      variant:
        required: false
        type: string
        default: default
      tag:
        required: true
        type: string
      platform-version:
        required: true
        type: string
      runner-label:
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ${{ inputs.runner-label }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4


      - name: Ensure make is installed
        run: |
          if ! command -v make > /dev/null; then
            sudo apt-get update && sudo apt-get install -y make
          fi

      - name: Ensure Docker CLI is available
        run: |
          if ! command -v docker > /dev/null; then
            sudo apt-get update && sudo apt-get install -y docker.io
          fi
          if command -v systemctl > /dev/null; then
            sudo systemctl start docker || true
          elif command -v service > /dev/null; then
            sudo service docker start || true
          fi

      - name: Resolve Python arch variant
        id: variant
        run: |
          case "${{ inputs.variant }}" in
            default)
              echo "python_arch=${{ inputs.arch }}" >> "$GITHUB_OUTPUT"
              echo "free_threaded=0" >> "$GITHUB_OUTPUT"
              ;;
            freethreaded)
              echo "python_arch=${{ inputs.arch }}-freethreaded" >> "$GITHUB_OUTPUT"
              echo "free_threaded=1" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported variant: ${{ inputs.variant }}"
              exit 1
              ;;
          esac

      - name: Build Python artifact using Makefile
        run: |
          make CONTAINER_ENGINE="sudo docker" \
            PYTHON_VERSION=${{ inputs.tag }} \
            ARCH=${{ inputs.arch }} \
            FREE_THREADED=${{ steps.variant.outputs.free_threaded }} \
            UBUNTU_VERSION=${{ inputs.platform-version }}


      - name: List output files
        run: ls -l python-versions/output

      - name: "Upload artifacts: tar & security reports"
        uses: actions/upload-artifact@v4
        with:
          name: python-tar-${{ inputs.tag }}-${{ steps.variant.outputs.python_arch }}-${{ inputs.platform-version }}
          path: |
            python-versions/output/python-${{ inputs.tag }}-linux-${{ inputs.platform-version }}-${{ steps.variant.outputs.python_arch }}.tar.gz
            python-versions/output/trivy-python-${{ inputs.tag }}-linux-${{ inputs.platform-version }}-${{ steps.variant.outputs.python_arch }}-vuln.json
            python-versions/output/trivy-python-${{ inputs.tag }}-linux-${{ inputs.platform-version }}-${{ steps.variant.outputs.python_arch }}-secret.json
            python-versions/output/python-${{ inputs.tag }}-linux-${{ inputs.platform-version }}-${{ steps.variant.outputs.python_arch }}.sbom.json
            python-versions/output/trivy-gate-result.json
            python-versions/output/trivy-gate.log
