name: Release Matching Python Tags
# This workflow intentionally does not use workflow_dispatch inputs to comply with policy.
# To control which tags to release, create a one-line file at
# .github/release/python-tag-filter.txt (e.g., 3.13.*). If absent/empty, it
# derives a filter from the latest version (e.g., 3.13.*).

on:
  # Inputs must be empty to comply with policy
  workflow_dispatch: {}
  push:
    paths:
      - .github/release/python-tag-filter.txt

permissions:
  contents: write    # Required for release workflow to push manifest and assets
  actions: write     # Required for calling reusable workflows

# Ensure only one release-matching run per ref executes at a time (builds are expensive).
concurrency:
  group: release-matching-${{ github.ref }}
  cancel-in-progress: false

jobs:
  get-tags:
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.collect.outputs.tags_json }}
      build_matrix_json: ${{ steps.collect.outputs.build_matrix_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --no-ansi

      - name: Get Python tags matching filter
        id: collect
        run: |
          # Parse YAML filter file
          filter_file=".github/release/python-tag-filter.txt"
          VERSION_FILTER=""
          RELEASE_TYPES="stable"
          VARIANTS_JSON='["default"]'
          
          if [ -f "$filter_file" ]; then
          CONFIG_JSON=$(poetry run python << 'EOF'
          import json
          import sys
          import yaml

          try:
            with open('.github/release/python-tag-filter.txt', 'r') as f:
              config = yaml.safe_load(f) or {}

            version = str(config.get('version', '')).strip()

            release_types = config.get('release_types', ['stable'])
            if isinstance(release_types, str):
              release_types = [release_types]
            release_types = [str(item).strip() for item in release_types if str(item).strip()]
            if not release_types:
              release_types = ['stable']

            variants = config.get('variants', ['default'])

            if isinstance(variants, str):
              variants = [variants]

            normalized_variants = []
            for variant in variants:
              value = str(variant).strip().lower()
              if value not in ('default', 'freethreaded'):
                continue
              if value not in normalized_variants:
                normalized_variants.append(value)

            if not normalized_variants:
              normalized_variants = ['default']

            print(json.dumps({
              'version': version,
              'release_types': release_types,
              'variants': normalized_variants
            }))
          except Exception as e:
            print(f"Error parsing YAML: {e}", file=sys.stderr)
            sys.exit(1)
          EOF
          )

          VERSION_FILTER=$(echo "$CONFIG_JSON" | jq -r '.version')
          RELEASE_TYPES=$(echo "$CONFIG_JSON" | jq -r '.release_types | join(" ")')
          VARIANTS_JSON=$(echo "$CONFIG_JSON" | jq -c '.variants')
          fi
          
          # If no filter provided, derive from latest version
          if [ -z "$VERSION_FILTER" ]; then
            LATEST=$(poetry run python .github/scripts/get_python_version.py --latest --release-types stable)
            echo "No filter supplied, fetched latest tag: $LATEST"
            # Convert latest version like 3.13.3 to 3.13.*
            VERSION_FILTER=$(echo "$LATEST" | sed -E 's/\.[0-9]+$/.*/')
            echo "Derived filter: $VERSION_FILTER"
            RELEASE_TYPES="stable"
          fi
          
          echo "Using version filter: $VERSION_FILTER"
          echo "Using release types: $RELEASE_TYPES"
          echo "Using variants: $VARIANTS_JSON"
          
          TAGS=$(poetry run python .github/scripts/get_python_version.py --list --filter "$VERSION_FILTER" --release-types $RELEASE_TYPES)
          echo "Raw tags found:"
          echo "$TAGS"

          TAGS_JSON=$(echo "$TAGS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Tags JSON for matrix:"
          echo "$TAGS_JSON"

          ARCHES_JSON='["s390x", "ppc64le"]'
          PLATFORMS_JSON='["24.04", "22.04"]'

          BUILD_MATRIX_JSON=$(jq -cn \
            --argjson tags "$TAGS_JSON" \
            --argjson arches "$ARCHES_JSON" \
            --argjson platforms "$PLATFORMS_JSON" \
            --argjson variants "$VARIANTS_JSON" '
              [
                $tags[] as $tag
                | $platforms[] as $platform_version
                | $arches[] as $arch
                | $variants[] as $variant
                | {
                    tag: $tag,
                    "platform-version": $platform_version,
                    arch: $arch,
                    variant: $variant,
                    runner_label: ("ubuntu-" + $platform_version + "-" + $arch)
                  }
              ]
            ')

          echo "Build matrix JSON:"
          echo "$BUILD_MATRIX_JSON"

          echo "tags_json=$TAGS_JSON" >> "$GITHUB_OUTPUT"
          echo "build_matrix_json=$BUILD_MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build-and-release-matrix:
    needs: get-tags
    strategy:
      fail-fast: false # Allow other builds to continue even if a sibling fails
      max-parallel: 8 # Reduce concurrent jobs to limit load on runners
      matrix:
        include: ${{ fromJson(needs.get-tags.outputs.build_matrix_json) }}
    uses: ./.github/workflows/reusable-build-and-release-python-versions.yml
    with:
      arch: ${{ matrix.arch }}
      tag: ${{ matrix.tag }}
      platform-version: ${{ matrix['platform-version'] }}
      variant: ${{ matrix.variant }}
      runner-label: ${{ matrix.runner_label }}


  release-assets:
    needs: [build-and-release-matrix, get-tags]
    if: always() && !cancelled()
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.get-tags.outputs.tags_json) }}
    uses: ./.github/workflows/reusable-release-python-tar.yml
    with:
      tag: ${{ matrix.tag }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-manifests:
    needs: release-assets
    if: always() && needs.release-assets.result != 'skipped' && needs.release-assets.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    concurrency:
      group: manifests-${{ github.ref }} # Shared with release-latest so manifest pushes serialize
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download partial manifest artifacts # Pull manifest-part-* artifacts from successful release jobs
        continue-on-error: true # Some matrix legs may fail and omit artifacts
        uses: actions/download-artifact@v4
        with:
          path: manifest-parts
          pattern: manifest-part-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --no-ansi

      - name: Apply partial manifests # Convert partial JSON blobs into tracked versions-manifests/*.json
        run: |
          poetry run python .github/scripts/apply_partial_manifests.py \
            --partials-dir manifest-parts \
            --manifest-dir versions-manifests

      - name: Commit manifest updates
        id: commit_manifests
        run: |
          if git status --porcelain -- versions-manifests | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add versions-manifests/*.json
            git commit -s -m "Apply manifest partials [skip ci]"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No manifest changes detected"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push manifest updates
        if: steps.commit_manifests.outputs.committed == 'true'
        run: |
          # Keep locally generated manifest files when resolving conflicts
          git pull --rebase --strategy=recursive --strategy-option=ours
          git push
